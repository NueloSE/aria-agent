[phases.setup]
nixPkgs = ["nodejs_20"]

# Install phase is intentionally NOT overridden here — nixpacks auto-detects
# the Python project and runs "pip install -e '.[dev]'" itself. Overriding it
# drops pip from the PATH (the bug that caused "pip: command not found").
# We install twak in the build phase, which runs after pip install completes.
[phases.build]
cmds = ["npm install -g @trustwallet/cli"]

[start]
cmd = "bash deploy/railway-start.sh"
